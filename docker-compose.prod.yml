version: "3.8"

services:
  php:
    build: .
    container_name: api_php
    volumes:
      - ./api:/var/www/api
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: web_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./api:/var/www/api
      - ./app:/var/www/app
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt/live/app.ibrexplorer.com/fullchain.pem:/etc/nginx/ssl/app_fullchain.pem:ro
      - /etc/letsencrypt/live/app.ibrexplorer.com/privkey.pem:/etc/nginx/ssl/app_privkey.pem:ro
      - /etc/letsencrypt/live/api.ibrexplorer.com/fullchain.pem:/etc/nginx/ssl/api_fullchain.pem:ro
      - /etc/letsencrypt/live/api.ibrexplorer.com/privkey.pem:/etc/nginx/ssl/api_privkey.pem:ro
    depends_on:
      - php
    networks:
      - app-network

  mysql:
    image: mysql:8.0
    container_name: mysql_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ibrexplorer
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - app-network

networks:
  app-network:

volumes:
  mysql_data: