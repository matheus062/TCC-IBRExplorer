services:
  postgres:
    image: postgres:18
    container_name: postgres_db
    ports:
      - "5433:5432" # Porta utilizada para acessar o DB do container
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USER}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DATABASE}" ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app-network

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: api_php
    restart: unless-stopped
    volumes:
      - ./api:/var/www/api
      - ./geoip:/var/www/api/geoip
      - vendor_data:/var/www/api/vendor
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    healthcheck:
      test: [ "CMD", "php", "-r", "exit(file_exists('/var/www/api/vendor/autoload.php') ? 0 : 1);" ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - app-network

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: pcap_worker
    restart: unless-stopped
    volumes:
      - ./api:/var/www/api
      - ./geoip:/var/www/api/geoip
      - vendor_data:/var/www/api/vendor
    depends_on:
      postgres:
        condition: service_healthy
      php:
        condition: service_healthy
    env_file: .env
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: frontend_app
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8080
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./app:/var/www/app
      - node_modules_data:/var/www/app/node_modules
    ports:
      - "5173:5173"
    networks:
      - app-network

  nginx:
    image: nginx:1.29-alpine
    container_name: web_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./api:/var/www/api:ro
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - app
    networks:
      - app-network

networks:
  app-network:

volumes:
  postgres_data:
  vendor_data:
  node_modules_data:
