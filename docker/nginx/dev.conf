# Rate-limit zones — chave vazia (OPTIONS/CORS preflight) desativa o limite
map $request_method $limit_key_auth {
    OPTIONS  "";
    default  $binary_remote_addr;
}

map $request_method $limit_key_password {
    OPTIONS  "";
    default  $binary_remote_addr;
}

limit_req_zone $limit_key_auth     zone=auth:10m     rate=10r/m;
limit_req_zone $limit_key_password zone=password:10m rate=5r/m;

server {
    listen 80 default_server;
    server_name _;

    root  /var/www/api/public;
    index index.php;

    server_tokens      off;
    client_max_body_size 64M;

    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header Referrer-Policy        "no-referrer"   always;

    # Login
    location = /auth {
        limit_req        zone=auth burst=5 nodelay;
        limit_req_status 429;
        try_files $uri   /index.php?$query_string;
    }

    # Recuperação e redefinição de senha
    location ^~ /password/ {
        limit_req        zone=password burst=3 nodelay;
        limit_req_status 429;
        try_files $uri   /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include                  fastcgi_params;
        fastcgi_index            index.php;
        fastcgi_param            SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass             php:9000;
        fastcgi_hide_header      X-Powered-By;
    }

    location ~ /\.ht {
        deny all;
    }
}
